<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027 대입논술 지원 전략집 · 리마인드 논술</title>
<style>
:root{--g:#1E7A44;--gd:#0E4A28;--soft:#E9F3EC;--soft2:#F3F8F4;--line:#CBDED1;--ink:#1F2421;--mut:#5B6B60;--gold:#E8C879}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;color:var(--ink);background:#fff}
header{position:sticky;top:0;z-index:20;background:var(--g);color:#fff;padding:20px 16px 16px;text-align:center}
header img.logo{width:56px;height:auto;display:block;margin:0 auto 10px}
header .day{color:var(--gold);font-size:11px;font-weight:800;letter-spacing:3px;margin-bottom:12px}
header .t{font-size:21px;font-weight:800;letter-spacing:-.4px}
header .s{font-size:11.5px;opacity:.92;margin-top:6px;line-height:1.5}
.wrap{max-width:760px;margin:0 auto;padding:14px 16px 90px}
.search{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;outline:none}
.search:focus{border-color:var(--g)}
.tabs{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.tab{flex:1;min-width:70px;text-align:center;padding:9px 6px;border:1.5px solid var(--line);border-radius:20px;font-size:13px;font-weight:700;color:var(--mut);background:#fff;cursor:pointer}
.tab.on{background:var(--g);color:#fff;border-color:var(--g)}
.hint{font-size:12px;color:var(--g);font-weight:700;line-height:1.5;margin:18px 2px 12px;background:var(--soft);border-left:4px solid var(--g);border-radius:8px;padding:10px 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:9px}
.uni{padding:13px 8px;border:1.5px solid var(--line);border-radius:12px;background:#fff;text-align:center;font-size:13.5px;font-weight:700;cursor:pointer;transition:.12s;line-height:1.25;position:relative}
.uni:hover,.uni:active{border-color:var(--g);background:var(--soft);color:var(--gd)}
.uni .dots{position:absolute;top:4px;right:6px;display:flex;gap:3px}
.uni .dot{font-size:12.5px;font-weight:900}
.dot.green{color:var(--g)}
.dot.red{color:#D64545}
.reg{font-size:12px;font-weight:800;color:var(--g);margin:18px 2px 8px;display:flex;align-items:center;gap:6px}
.reg::before{content:"";width:4px;height:14px;background:var(--g);border-radius:2px}
.summary-btn{display:block;width:100%;margin:4px 0 2px;padding:13px;border:none;border-radius:12px;background:var(--gd);color:#fff;font-size:14px;font-weight:800;cursor:pointer}
.topbanner{display:block;width:100%;background:linear-gradient(90deg,#F4E1A0,#E4C56B);color:var(--gd);text-decoration:none;padding:14px 16px;font-weight:800;font-size:13.5px;text-align:center;line-height:1.4;border-bottom:2px solid #D9B94F}
.botbanner{flex:none;display:block;width:100%;background:linear-gradient(90deg,#F4E1A0,#E4C56B);color:var(--gd);text-decoration:none;padding:14px 16px;font-weight:800;font-size:13.5px;text-align:center;line-height:1.4;border-top:2px solid #D9B94F;box-shadow:0 -3px 14px rgba(0,0,0,.12)}
.lock{background:#FBF3DD;border:1.5px dashed var(--gold);border-radius:10px;padding:14px;text-align:center;font-size:13.5px;color:#7A5E12;line-height:1.6}
.lockbtn{display:inline-block;margin-top:10px;background:var(--g);color:#fff;text-decoration:none;padding:10px 18px;border-radius:22px;font-weight:800;font-size:13px}
.lockbtn2{display:inline-block;margin-top:6px;background:#fff;color:var(--g);border:1.5px solid var(--g);text-decoration:none;padding:9px 16px;border-radius:22px;font-weight:800;font-size:12.5px}
footer{border-top:1px solid var(--line);padding:16px;text-align:center;font-size:11px;color:var(--mut);line-height:1.6}
.overlay{position:fixed;inset:0;z-index:40;background:#fff;transform:translateY(100%);transition:transform .25s ease;display:flex;flex-direction:column;overflow:hidden}
.overlay.open{transform:translateY(0)}
.obar{position:sticky;top:0;background:var(--g);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:12px;z-index:2}
.back{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:9px;font-size:18px;cursor:pointer;flex:none}
.obar .n{font-size:17px;font-weight:800}
.obar .rg{font-size:11px;opacity:.85;margin-left:auto}
.obody{flex:1;overflow-y:auto;padding:16px;max-width:760px;margin:0 auto;width:100%}
.card{border:1.5px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:13px}
.card h3{margin:0;padding:11px 14px;background:var(--soft);color:var(--gd);font-size:13.5px}
.card .body{padding:12px 14px;font-size:14px;line-height:1.55}
.kv{display:flex;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line)}
.kv:last-child{border-bottom:none}
.kv .k{flex:none;width:44px;color:var(--mut);font-size:12.5px;font-weight:700;padding-top:1px}
.kv .v{flex:1}
.badge{display:inline-block;background:var(--g);color:#fff;font-size:12.5px;font-weight:800;padding:4px 11px;border-radius:20px}
.mbadge{display:inline-block;background:#fff;color:var(--g);border:1.5px solid var(--g);font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;margin-top:8px}
.info{background:var(--soft2);border:1px solid var(--line);border-left:4px solid var(--g);border-radius:10px;padding:11px 12px;font-size:13.5px;line-height:1.6;color:var(--gd)}
.tie{background:var(--soft2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.5;color:var(--gd)}
.notice{background:#FDECEC;border:1.5px solid #E7A6A6;border-left:5px solid #D64545;border-radius:10px;padding:13px;font-size:14px;font-weight:800;color:#A12B2B;text-align:center;line-height:1.55}
.skill{background:linear-gradient(180deg,#fbf7ea,#fff);border:1.5px dashed var(--gold);border-radius:10px;padding:12px;font-size:13px;color:#8a6d1f;text-align:center;line-height:1.5}
.disc{font-size:11.5px;color:var(--mut);margin-top:6px;line-height:1.5}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:2px}
th,td{border:1px solid var(--line);padding:5px 4px;text-align:center;vertical-align:middle}
th{background:var(--gd);color:#fff;font-weight:700}
tr:nth-child(even) td{background:var(--soft2)}
.gtbl th,.gtbl td{padding:5px 2px;font-size:11.5px}
.noresult{text-align:center;color:var(--mut);padding:30px;font-size:14px}
</style>
</head>

    h+=`<div class="card"><h3>👥 2027 모집인원 (계열 합계)</h3><div class="body">${u.enr}<div class="disc">※ 인문논술 학과별 세부 인원표는 각 대학 요강 기준으로 정리 중입니다.</div></div></div>`;
  }
  if(u.noclass){
    h+=`<div class="card"><h3>🏆 리마인드 논술 수업 안내</h3><div class="body"><div class="notice">리마인드 논술에서 <b>별도 수업을 진행하지 않으니</b><br>참고 부탁드립니다.</div></div></div>`;
  } else {
    h+=`<div class="card"><h3>🏆 리마인드 논술의 ${u.n} 합격 SKILL</h3><div class="body"><div class="lock">🔒 <b>${u.n} 합격 SKILL 영상</b>은 리마인드 논술 <b>수강생 전용</b>입니다.<br><a class="lockbtn" href="${LINKS.video}" target="_blank">▶ 합격 SKILL 영상 보러가기</a><div style="margin-top:10px;font-size:12px;color:#7A5E12">아직 수강생이 아니라면?</div><a class="lockbtn2" href="${LINKS.buy}" target="_blank">🛒 강의 구매하고 영상 보기 →</a></div></div></div>`;
  }
  h+=`<div class="disc" style="text-align:center;margin-top:8px">최종 지원 전 <b>${u.n} 입학처 2027 수시 모집요강</b>을 반드시 확인하세요.</div>`;
  document.getElementById('ovBody').innerHTML=h;
  document.getElementById('ovBody').parentElement.scrollTop=0;
  setBanner(document.getElementById('botBanner'),pickBanner());
  document.getElementById('ov').classList.add('open');
}

function openSummary(){
  document.getElementById('ovName').textContent="전체 요약";document.getElementById('ovReg').textContent="";
  const rows=D.map(u=>`<tr><td style="text-align:left">${u.pre?'<span style=\'color:#D64545;font-weight:900\'>✓</span> ':''}${u.m?'<span style=\'color:var(--g);font-weight:900\'>✓</span> ':''}${u.n}</td><td>${u.no}</td><td style="text-align:left">${u.mn}</td></tr>`).join('');
  document.getElementById('ovBody').innerHTML=`<div class="card"><h3>📊 대학별 요약 (반영비중 · 인문 수능최저)</h3><div class="body" style="padding:8px"><table><thead><tr><th style="text-align:left">대학</th><th>반영</th><th style="text-align:left">인문 최저</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="disc" style="text-align:center">© 리마인드 논술<br>최종 지원 전 각 대학 입학처 <b>2027 수시 모집요강</b>을 꼭 확인하세요.</div>`;
  document.getElementById('ov').classList.add('open');
}
function closeOv(){document.getElementById('ov').classList.remove('open')}
render();
setBanner(document.getElementById('topBanner'),pickBanner());
</script>
</body>
</html>
